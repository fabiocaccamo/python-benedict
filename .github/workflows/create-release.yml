name: Create release

on:
  push:
    tags:
      - '*.*.*'

permissions: read-all

jobs:
  build:
    runs-on: ubuntu-latest
    # environment: release  # uncomment to require manual approval before publishing to PyPI (recommended for extra protection)
    permissions:
      contents: write    # needed to upload SBOM files as release assets via `gh release upload`
      id-token: write    # needed for PyPI Trusted Publishing (OIDC) via pypa/gh-action-pypi-publish and SLSA provenance

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.x'
          cache: 'pip'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install requirements
        run: |
          python -m pip install -r requirements.txt -r requirements-release.txt
          python -m pip install ".[all]"

      - name: Build package
        run: python -m build

      - name: Generate SBOM
        run: |
          cyclonedx-py environment \
            --pyproject pyproject.toml \
            --mc-type library \
            --of JSON \
            -o sbom.cyclonedx.json
          cyclonedx-py environment \
            --pyproject pyproject.toml \
            --mc-type library \
            --of XML \
            -o sbom.cyclonedx.xml

      - name: Generate license report
        run: |
          pip-licenses \
            --ignore-packages build cyclonedx-bom cyclonedx-py pip-licenses \
            --with-authors --with-urls --format=csv --output-file=licenses.csv
          pip-licenses \
            --ignore-packages build cyclonedx-bom cyclonedx-py pip-licenses \
            --with-authors --with-urls --format=markdown --output-file=licenses.md

      - name: Extract release notes
        id: extract-release-notes
        uses: ffurrer2/extract-release-notes@273da39a24fb7db106a35526c8162815faffd31d # v3

      - name: Create release
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1
        with:
          body: ${{ steps.extract-release-notes.outputs.release_notes }}
          token: ${{ secrets.WORKFLOWS_CREATE_RELEASE_TOKEN }}

      - name: Upload release assets
        run: |
          gh release upload ${{ github.ref_name }} \
            sbom.cyclonedx.json \
            sbom.cyclonedx.xml \
            licenses.csv \
            licenses.md \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.WORKFLOWS_CREATE_RELEASE_TOKEN }}

      - name: Publish on PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: dist/
          attestations: true
          # password: ${{ secrets.WORKFLOWS_PUBLISH_TO_PYPI_TOKEN }}
